<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusForge AI | Build The Future</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0B0C10;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at top right, #1f2833, #0b0c10);
            position: relative; /* Required for the glow effect to move properly */
        }

        /* NEW: The AI Glow Effect Styling */
        #ai-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(102, 252, 241, 0.12) 0%, transparent 60%);
            border-radius: 50%;
            pointer-events: none; /* Ensures the glow doesn't block you from clicking the button */
            transform: translate(-50%, -50%);
            z-index: 0; /* Keeps the glow behind the card */
        }

        .glass-container {
            position: relative;
            z-index: 10; /* Keeps the card in front of the glow */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(#66FCF1, #45A29E);
            -webkit-background-clip: text;
            background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: #C5C6C7;
            margin-bottom: 30px;
            font-weight: 300;
            line-height: 1.6;
        }

        .cta-button {
            background-color: transparent;
            color: #66FCF1;
            border: 2px solid #66FCF1;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .cta-button:hover {
            background-color: #66FCF1;
            color: #0B0C10;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.5);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div id="ai-glow"></div>

    <div class="glass-container">
        <h1>NexusForge AI</h1>
        <p>The ultimate AI software creation platform. Architect websites, mobile apps, and robust startup MVPs at the speed of thought. Coming soon.</p>

    <script>
        // 1. We grab the glowing orb from the HTML using its ID
        const glow = document.getElementById('ai-glow');

        // 2. We tell the browser to listen for the mouse moving
        document.addEventListener('mousemove', function(event) {
            
            // 3. We find the exact X and Y coordinates of your mouse
            const mouseX = event.clientX;
            const mouseY = event.clientY;

            // 4. We force the glow to move to those exact coordinates
            glow.style.left = mouseX + 'px';
            glow.style.top = mouseY + 'px';
        });
    </script>

</body>
</html>
