<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NexusForge AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        .sidebar a {
    text-decoration: none;
    color: inherit;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0B0C10;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            background-color: #121418;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #66FCF1;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-link {
            color: #C5C6C7;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            background-color: rgba(102, 252, 241, 0.1);
            color: #66FCF1;
        }

        /* Main Content Workspace */
        .workspace {
            flex: 1;
            background-color: #0B0C10;
            padding: 40px 50px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .profile {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #66FCF1, #45A29E);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: #0B0C10;
            cursor: pointer;
        }

        /* AI Input Area */
        .ai-prompt-container {
            background: linear-gradient(145deg, #121418, #0B0C10);
            border: 1px solid rgba(102, 252, 241, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .ai-prompt-container h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #C5C6C7;
        }

        .input-group {
            display: flex;
            gap: 15px;
        }

        .ai-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 18px 25px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .ai-input:focus {
            border-color: #66FCF1;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.1);
        }

        .generate-btn {
            background-color: #66FCF1;
            color: #0B0C10;
            border: none;
            padding: 0 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .generate-btn:hover {
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
            transform: translateY(-2px);
        }

        /* Loading Animation Class */
        .loading {
            background-color: #45A29E !important;
            pointer-events: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Recent Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: #121418;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block; /* Required for a tag to act like a card */
        }

        .project-card:hover {
            border-color: rgba(102, 252, 241, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .project-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .project-status {
            font-size: 0.85rem;
            color: #66FCF1;
            background: rgba(102, 252, 241, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
        }

        /* Dynamic Status Color for "Generating" */
        .status-generating {
            color: #fca311;
            background: rgba(252, 163, 17, 0.1);
        }
    </style>
</head>
<body>

    <div class="sidebar">
    <div class="logo">NexusForge AI</div>
    <a href="dashboard.html" class="nav-link active"><span>⚡</span> AI Workspace</a>
    <a href="projects.html" class="nav-link"><span>📁</span> My Projects</a>
    <a href="settings.html" class="nav-link"><span>⚙️</span> Settings</a>
</div>

    <div class="workspace">
        <div class="header">
            <h1>Welcome back, Founder.</h1>
            <div class="profile">AK</div>
        </div>

        <div class="ai-prompt-container">
            <h2>What are we building today?</h2>
            <div class="input-group">
                <input type="text" id="ai-command" class="ai-input" placeholder="e.g., Generate a crypto trading dashboard...">
                <button class="generate-btn" id="gen-btn" onclick="startGeneration()">Generate Code</button>
            </div>
        </div>

        <h2 style="font-size: 1.2rem; margin-bottom: 20px; color: #C5C6C7;">Recent Deployments</h2>
        
        <div class="projects-grid" id="grid">
            
            <a href="chess.html" class="project-card">
                <div class="project-title">Chess Tactics Engine</div>
                <div class="project-status">Deployed - Live</div>
            </a>

            <div class="project-card">
                <div class="project-title">E-Commerce Storefront</div>
                <div class="project-status">Deployed - 2 hours ago</div>
            </div>
        </div>
    </div>
<script>
        function startGeneration() {
            const inputField = document.getElementById('ai-command');
            const promptText = inputField.value;
            const btn = document.getElementById('gen-btn');
            const grid = document.getElementById('grid');
            
            if(promptText.trim() === '') {
                alert('Please enter a command.');
                return;
            }
            
            const originalText = btn.innerText;
            btn.innerText = 'Compiling Architecture...';
            btn.classList.add('loading');
            
            setTimeout(() => {
                btn.innerText = 'Deploying Servers...';
                
                setTimeout(() => {
                    // VISUAL: Build the card
                    const newCard = document.createElement('div');
                    newCard.className = 'project-card';
                    newCard.innerHTML = `
                        <div class="project-title">${promptText}</div>
                        <div class="project-status status-generating">Just Created - Draft</div>
                    `;
                    grid.prepend(newCard);
                    newCard.scrollIntoView({ behavior: 'smooth' });

                    // MEMORY: Save to localStorage
                    let savedProjects = JSON.parse(localStorage.getItem('nexusProjects')) || [];
                    savedProjects.unshift({
                        title: promptText,
                        status: 'Draft - Created Today'
                    });
                    localStorage.setItem('nexusProjects', JSON.stringify(savedProjects));

                    // Reset UI
                    btn.classList.remove('loading');
                    btn.innerText = originalText;
                    inputField.value = '';
                    
                }, 2000); 
                
            }, 1500); 
        }
    </script>

</body>
</html>
